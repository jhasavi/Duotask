<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuoTask - Signing In</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }
    
    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 90%;
    }
    
    .logo {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 20px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .message {
      font-size: 1.1rem;
      margin: 20px 0;
      opacity: 0.9;
    }
    
    .subtitle {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">DuoTask</div>
    <div class="spinner"></div>
    <div class="message">Signing you in...</div>
    <div class="subtitle">Please wait while we complete your authentication</div>
  </div>

  <script>
    // Handle OAuth callback and redirect to main app
    function handleCallback() {
      // Check if this is an OAuth callback
      const urlParams = new URLSearchParams(window.location.search);
      const hash = window.location.hash;
      
      if (urlParams.has('code') || hash.includes('access_token')) {
        // This is a valid OAuth callback
        console.log('OAuth callback detected, redirecting to main app...');
        
        // Small delay to show the loading screen
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      } else {
        // Not a valid callback, redirect to main app
        console.log('No OAuth callback detected, redirecting to main app...');
        window.location.href = '/';
      }
    }

    // Handle errors
    function handleError() {
      const urlParams = new URLSearchParams(window.location.search);
      const error = urlParams.get('error');
      const errorDescription = urlParams.get('error_description');
      
      if (error) {
        console.error('OAuth error:', error, errorDescription);
        // Redirect to main app with error
        window.location.href = '/?error=' + encodeURIComponent(error);
      } else {
        handleCallback();
      }
    }

    // Start handling the callback when page loads
    document.addEventListener('DOMContentLoaded', handleError);
  </script>
</body>
</html>
