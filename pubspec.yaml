name: duotask
description: A visually engaging, real-time task-sharing app for two people built with Flutter and Supabase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.3.4
  
  # State Management
  provider: ^6.1.1
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  animations: ^2.0.11
  confetti: ^0.7.0
  
  # Google Sign-In
  google_sign_in: ^6.2.1
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.4
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4
  timezone: ^0.9.2
  connectivity_plus: ^5.0.2
  
  # Natural Language Processing (for task input)
  timeago: ^3.6.0
  
  # Speech to Text
  speech_to_text: ^6.6.0
  permission_handler: ^11.2.0
  
  # Calendar
  table_calendar: ^3.0.9
  # device_calendar: ^4.3.3  # Commented out - will be added in future update
  
  # Environment Variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/docs/
